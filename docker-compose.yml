version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: notification-db-container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresspassword 
      POSTGRES_DB: notification_db
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: